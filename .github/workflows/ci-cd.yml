name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  # ─── JOB 1: LINT ───────────────────────────────────────────
  lint:
    name: Lint Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Lint Backend
        working-directory: ./backend
        run: |
          npm install
          npm run lint --if-present

      - name: Lint Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run lint --if-present

      - name: Lint Worker (Python)
        run: |
          pip install flake8
          flake8 worker/ --max-line-length=120 --ignore=E501,W503 --exit-zero

  # ─── JOB 2: BUILD & PUSH IMAGES ────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image tag
        id: tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build & Push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-task-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/ai-task-backend:${{ steps.tag.outputs.TAG }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-task-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/ai-task-frontend:${{ steps.tag.outputs.TAG }}

      - name: Build & Push Worker
        uses: docker/build-push-action@v4
        with:
          context: ./worker
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-task-worker:latest
            ${{ secrets.DOCKER_USERNAME }}/ai-task-worker:${{ steps.tag.outputs.TAG }}

  # ─── JOB 3: UPDATE INFRA REPO ──────────────────────────────
  update-infra:
    name: Update Image Tags in Infra Repo
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v3
        with:
          repository: ${{ github.repository_owner }}/ai-task-platform-infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Update backend image tag
        run: |
          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/ai-task-backend:.*|image: ${{ secrets.DOCKER_USERNAME }}/ai-task-backend:${{ steps.tag.outputs.TAG }}|g" backend/deployment.yaml

      - name: Update frontend image tag
        run: |
          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/ai-task-frontend:.*|image: ${{ secrets.DOCKER_USERNAME }}/ai-task-frontend:${{ steps.tag.outputs.TAG }}|g" frontend/deployment.yaml

      - name: Update worker image tag
        run: |
          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/ai-task-worker:.*|image: ${{ secrets.DOCKER_USERNAME }}/ai-task-worker:${{ steps.tag.outputs.TAG }}|g" worker/deployment.yaml

      - name: Commit and push updated tags
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ steps.tag.outputs.TAG }}"
          git push